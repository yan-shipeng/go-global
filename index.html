<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;

      justify-content: center;

      color: #0d8b96;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      letter-spacing: 0.05em;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="loading">正在加载模拟系统…</div>

    id="app"
    src="https://china-game-mzbua6le.manus.space"
    allow="fullscreen"
    onload="document.getElementById('loading').classList.add('hidden')"
  ></iframe>

</html>
